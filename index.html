<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>马原手卡</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5eee6;
      --paper: rgba(255, 251, 246, 0.9);
      --paper-strong: rgba(255, 251, 246, 0.97);
      --ink: #1f2535;
      --muted: #7a7f8d;
      --line: rgba(31, 37, 53, 0.1);
      --accent: #3467e8;
      --accent-deep: #2853bf;
      --accent-soft: rgba(52, 103, 232, 0.12);
      --green: #22a34d;
      --green-soft: rgba(34, 163, 77, 0.14);
      --shadow: 0 24px 60px rgba(83, 66, 45, 0.12);
      --radius: 28px;
      --max: 1180px;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top right, rgba(52, 103, 232, 0.1), transparent 22%),
        radial-gradient(circle at left 12%, rgba(34, 163, 77, 0.08), transparent 18%),
        linear-gradient(180deg, #f7f1e8 0%, #efe5d9 100%);
    }
    a { color: inherit; text-decoration: none; }
    button, select { font: inherit; }
    .shell { width: min(calc(100% - 24px), var(--max)); margin: 18px auto 36px; }
    .topbar, .progress-card, .card-shell, .quiz-card, .result-card {
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, 0.72);
      background: var(--paper);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }
    .topbar {
      position: sticky;
      top: 10px;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 12px 16px;
      margin-bottom: 18px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .seal {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #fffaf4;
      font-weight: 800;
      background: linear-gradient(135deg, #d66f4d, #ae3917);
    }
    .brand strong, .brand span {
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .brand strong { letter-spacing: 0.04em; }
    .brand span { font-size: 12px; color: var(--muted); }
    .nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .nav a {
      padding: 10px 14px;
      border-radius: 999px;
      color: var(--muted);
    }
    .nav a.active {
      background: var(--accent-soft);
      color: var(--accent-deep);
    }
    .nav a:hover {
      background: rgba(0, 0, 0, 0.05);
      color: var(--ink);
    }
    .section-head {
      margin-bottom: 14px;
    }
    .section-head h1, .section-head h2 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 42px);
      letter-spacing: -0.04em;
    }
    .section-head p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.05);
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .tools {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }
    select, button {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
      color: var(--ink);
      border-radius: 999px;
      padding: 12px 14px;
    }
    button {
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
    }
    button:hover { transform: translateY(-1px); }
    .toggle.active {
      background: var(--accent-soft);
      border-color: rgba(52, 103, 232, 0.24);
      color: var(--accent-deep);
    }
    .progress-card {
      padding: 18px 20px;
      margin-bottom: 16px;
      background: var(--paper-strong);
    }
    .progress-card-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 14px;
      margin-bottom: 10px;
    }
    .progress-card-head strong {
      font-size: 18px;
    }
    .progress-card-head span {
      color: var(--muted);
      font-size: 15px;
    }
    .progress-track {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.08);
    }
    .progress-fill {
      display: block;
      width: 0;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--green), #4b7767);
    }
    .card-shell {
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(249,242,235,0.96));
    }
    .card-stage {
      position: relative;
    }
    .card {
      position: relative;
      min-height: clamp(430px, 72vh, 620px);
      cursor: pointer;
      overflow: hidden;
    }
    .card-main {
      min-height: clamp(430px, 72vh, 620px);
      padding: 22px 22px 18px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.05);
      color: var(--muted);
      font-size: 13px;
    }
    .helper-bar {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .helper-chip {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(52, 103, 232, 0.08);
      color: #8890a5;
      font-size: 13px;
      white-space: nowrap;
    }
    .mastery-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: none;
      background: var(--green-soft);
      color: var(--green);
      font-size: 22px;
      font-weight: 700;
    }
    .mastery-btn.active {
      background: var(--green);
      color: #f3fff5;
    }
    .question-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 8px 18px 18px;
      transition: transform 0.42s cubic-bezier(0.2, 0.7, 0.2, 1), opacity 0.32s ease;
    }
    .question-index {
      color: var(--accent);
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }
    .question-wrap h2 {
      margin: 14px 0 0;
      max-width: 11ch;
      font-size: clamp(30px, 3.8vw, 52px);
      line-height: 1.12;
      letter-spacing: -0.05em;
      transition: transform 0.42s cubic-bezier(0.2, 0.7, 0.2, 1), font-size 0.32s ease;
    }
    .question-foot {
      padding: 0 10px 0;
      color: var(--muted);
      line-height: 1.7;
      text-align: center;
      font-size: 14px;
    }
    .answer-panel {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: min(30vh, 240px);
      background: linear-gradient(180deg, rgba(52, 103, 232, 0.98), rgba(44, 92, 214, 0.98));
      color: #f6f9ff;
      transition: opacity 0.28s ease, transform 0.46s cubic-bezier(0.2, 0.7, 0.2, 1);
      opacity: 0;
      transform: translateY(100%);
      padding: 22px 28px 26px;
      text-align: center;
      border-top-left-radius: 28px;
      border-top-right-radius: 28px;
    }
    .answer-panel-inner {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 14px;
    }
    .answer-label {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.85;
    }
    .answer-text {
      font-size: clamp(24px, 3.2vw, 44px);
      line-height: 1.24;
      letter-spacing: -0.04em;
      font-weight: 800;
    }
    .card.show .question-wrap {
      transform: translateY(-88px) scale(0.92);
      opacity: 0.98;
    }
    .card.show .question-wrap h2 {
      transform: scale(0.84);
    }
    .card.show .answer-panel {
      opacity: 1;
      transform: translateY(0);
    }
    .card-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 18px;
    }
    .nav-floats {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .nav-float {
      position: absolute;
      top: 50%;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      transform: translateY(-50%);
      pointer-events: auto;
      box-shadow: 0 14px 28px rgba(83, 66, 45, 0.14);
      font-size: 34px;
      line-height: 1;
      padding: 0;
    }
    .nav-float.prev { left: -84px; }
    .nav-float.next { right: -84px; }
    .nav-float:hover { transform: translateY(-50%) scale(1.04); }
    .nav-float:active { transform: translateY(-50%) scale(0.96); }
    .nav-float span {
      display: block;
      transform: translateY(-1px);
    }
    .quiz-layout {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 18px;
    }
    .quiz-card, .result-card {
      padding: 18px;
      background: var(--paper-strong);
    }
    .quiz-card h3, .result-card h3 {
      margin: 0 0 8px;
      font-size: 18px;
    }
    .quiz-step {
      margin-bottom: 12px;
    }
    .quiz-question {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.18;
      letter-spacing: -0.04em;
    }
    .quiz-options {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }
    .quiz-options button {
      text-align: left;
      border-radius: 18px;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.78);
    }
    .quiz-options button.selected {
      background: rgba(47, 94, 79, 0.16);
      border-color: rgba(47, 94, 79, 0.28);
    }
    .quiz-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .score {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 10px;
    }
    .score strong {
      font-size: 54px;
      line-height: 1;
    }
    .mistake {
      margin-top: 12px;
      padding: 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.68);
      border: 1px solid var(--line);
    }
    .muted {
      color: var(--muted);
      line-height: 1.7;
    }
    footer {
      padding: 14px 0 6px;
      text-align: center;
      color: var(--muted);
    }
    @media (max-width: 980px) {
      .tools, .quiz-layout {
        grid-template-columns: 1fr;
      }
      .question-wrap h2, .quiz-question {
        max-width: none;
      }
      .helper-bar {
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      .card,
      .card-main {
        min-height: clamp(380px, 62vh, 520px);
      }
      .nav-float.prev { left: -18px; }
      .nav-float.next { right: -18px; }
      .nav-float {
        width: 54px;
        height: 54px;
        font-size: 30px;
      }
      .question-wrap {
        padding: 8px 12px 12px;
      }
      .question-wrap h2 {
        font-size: clamp(26px, 6vw, 40px);
      }
      .answer-panel {
        height: min(24vh, 170px);
      }
      .answer-text {
        font-size: clamp(20px, 4.8vw, 32px);
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div class="brand">
        <div class="seal">马原</div>
        <div>
          <strong>马原知识手卡</strong>
          <span>500 张知识卡，直接开刷</span>
        </div>
      </div>
      <nav class="nav">
        <a href="index.html" class="active">手卡</a>
        <a href="quiz.html">自测</a>
      </nav>
    </div>

    <section class="section-head">
      <span class="eyebrow">WHZNB</span>
      <h1>速记手卡</h1>
    </section>

    <div class="tools">
      <select id="chapterFilter"></select>
      <button id="modeAll" class="toggle active" type="button">显示全部</button>
      <button id="modeWeak" class="toggle" type="button">只看未掌握</button>
    </div>

    <div class="progress-card">
      <div class="progress-card-head">
        <strong>当前掌握度</strong>
        <span id="masteryText"></span>
      </div>
      <div class="progress-track">
        <span class="progress-fill" id="masteryBar"></span>
      </div>
    </div>

    <div class="card-stage">
      <button class="nav-float prev" id="prevBtn" type="button" aria-label="上一题"><span>‹</span></button>
      <button class="nav-float next" id="nextBtn" type="button" aria-label="下一题"><span>›</span></button>
      <div class="card-shell">
        <div class="card" id="flashcard">
        <div class="card-main">
          <div class="card-top">
            <span class="pill" id="flashStep">QUESTION 1</span>
            <div class="helper-bar">
              <span class="helper-chip">⌨ 空格翻答案 / ← → 切换</span>
              <button class="mastery-btn" id="masteryBtn" type="button">★</button>
            </div>
          </div>

            <div class="question-wrap">
              <span class="question-index" id="flashChapter">导论</span>
              <h2 id="flashQuestion"></h2>
            </div>

          <p class="question-foot">点击显示答案</p>
          </div>

        <div class="answer-panel" id="answerPanel">
          <div class="answer-panel-inner">
            <span class="answer-label">Answer</span>
            <div class="answer-text" id="flashAnswer"></div>
          </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card-actions">
      <button id="shuffleBtn" type="button">随机重排</button>
      <button id="resetMasteryBtn" type="button">清空掌握记录</button>
    </div>
  </div>

  <script>
    const cards = [{"id":1,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"什么是马克思主义？","answer":"马克思主义是关于无产阶级和人类解放的科学。"},{"id":2,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"马克思主义的理论构成是什么？","answer":"马克思主义哲学、马克思主义政治经济学、科学社会主义。"},{"id":3,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"马克思主义哲学的地位是什么？","answer":"理论基础和方法论基础。"},{"id":4,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"马克思主义政治经济学的地位是什么？","answer":"主体理论。"},{"id":5,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"科学社会主义的地位是什么？","answer":"目的和归宿。"},{"id":6,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"马克思主义的基本立场是什么？","answer":"人民立场。"},{"id":7,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"马克思主义的基本观点是什么？","answer":"关于自然、社会和人类思维发展一般规律的科学认识。"},{"id":8,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"马克思主义的基本方法是什么？","answer":"辩证唯物主义和历史唯物主义的方法。"},{"id":9,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"马克思主义最鲜明的理论品格是什么？","answer":"与时俱进。"},{"id":10,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"马克思主义最鲜明的政治立场是什么？","answer":"站在人民大众立场上。"},{"id":11,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"马克思主义最重要的理论品质是什么？","answer":"坚持一切从实际出发，理论联系实际，在实践中检验和发展真理。"},{"id":12,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"马克思主义产生的社会历史条件是什么？","answer":"资本主义的发展和工人运动的兴起。"},{"id":13,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"马克思主义产生的阶级基础是什么？","answer":"无产阶级作为独立的政治力量登上历史舞台。"},{"id":14,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"马克思主义产生的自然科学前提有哪些？","answer":"细胞学说、能量守恒与转化定律、生物进化论。"},{"id":15,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"马克思主义产生的直接理论来源是什么？","answer":"德国古典哲学、英国古典政治经济学、英法空想社会主义。"},{"id":16,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"标志马克思主义公开问世的著作是什么？","answer":"《共产党宣言》。"},{"id":17,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"《共产党宣言》发表的意义是什么？","answer":"标志着马克思主义的公开问世。"},{"id":18,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"为什么说马克思主义具有科学性？","answer":"因为它揭示了自然界、人类社会和人类思维发展的普遍规律。"},{"id":19,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"为什么说马克思主义具有革命性？","answer":"因为它是改变世界、实现人民解放的理论。"},{"id":20,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"为什么说马克思主义具有实践性？","answer":"因为它来源于实践、指导实践，并在实践中接受检验。"},{"id":21,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"为什么说马克思主义具有人民性？","answer":"因为它坚持人民至上，致力于实现最广大人民根本利益。"},{"id":22,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"为什么说马克思主义具有发展开放性？","answer":"因为它不是封闭教条，而是在实践中不断丰富发展。"},{"id":23,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"学习马克思主义的根本要求是什么？","answer":"把握立场、观点和方法的统一。"},{"id":24,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"学习马原的核心目的是什么？","answer":"掌握观察问题、分析问题、解决问题的科学世界观和方法论。"},{"id":25,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"为什么要推进马克思主义中国化时代化？","answer":"因为马克思主义必须同具体实际相结合才能保持生命力。"},{"id":26,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"马克思主义政党的根本政治立场是什么？","answer":"人民立场。"},{"id":27,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"马克思主义关于未来社会的立场是什么？","answer":"追求人类解放和每个人自由全面发展。"},{"id":28,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"马克思主义中国化时代化的根本方法是什么？","answer":"把马克思主义基本原理同中国具体实际相结合、同中华优秀传统文化相结合。"},{"id":29,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"马克思主义为什么能跨越时代保持生命力？","answer":"因为它揭示的是普遍规律，并且始终面向现实问题。"},{"id":30,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"坚持马克思主义为什么要反对教条主义？","answer":"因为真正坚持马克思主义必须坚持具体问题具体分析。"},{"id":31,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"理论联系实际为什么是学习马克思主义的重要原则？","answer":"因为马克思主义本身就是实践基础上的科学理论。"},{"id":32,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"马克思主义的使命归根到底是什么？","answer":"实现无产阶级和全人类解放。"},{"id":33,"source_pdf":"04 导论2.pdf","chapter":"导论","question":"马克思主义观察问题的根本立场是什么？","answer":"人民立场。"},{"id":34,"source_pdf":"04 导论2.pdf","chapter":"导论","question":"马克思主义分析问题的根本方法是什么？","answer":"辩证唯物主义和历史唯物主义。"},{"id":35,"source_pdf":"04 导论2.pdf","chapter":"导论","question":"马克思主义追求的价值目标是什么？","answer":"实现人的自由而全面的发展。"},{"id":36,"source_pdf":"04 导论2.pdf","chapter":"导论","question":"马克思主义与空想理论的根本区别是什么？","answer":"它建立在科学揭示社会发展规律的基础上。"},{"id":37,"source_pdf":"04 导论2.pdf","chapter":"导论","question":"为什么说马克思主义是行动的理论？","answer":"因为它不仅解释世界，而且致力于改变世界。"},{"id":38,"source_pdf":"04 导论2.pdf","chapter":"导论","question":"为什么说坚持马克思主义必须坚持问题导向？","answer":"因为理论价值只有在回答现实问题中才能体现。"},{"id":39,"source_pdf":"04 导论2.pdf","chapter":"导论","question":"为什么说马克思主义不是僵死教条？","answer":"因为它随着实践和时代发展而发展。"},{"id":40,"source_pdf":"04 导论2.pdf","chapter":"导论","question":"衡量学习马克思主义成效的重要标准是什么？","answer":"能否运用其立场观点方法分析和解决实际问题。"},{"id":41,"source_pdf":"04 导论2.pdf","chapter":"导论","question":"马克思主义的世界观基础是什么？","answer":"辩证唯物主义和历史唯物主义。"},{"id":42,"source_pdf":"04 导论2.pdf","chapter":"导论","question":"马克思主义的方法论要求是什么？","answer":"实事求是、辩证分析、历史分析。"},{"id":43,"source_pdf":"04 导论2.pdf","chapter":"导论","question":"为什么说马克思主义是工人阶级的世界观？","answer":"因为它代表无产阶级和最广大人民根本利益。"},{"id":44,"source_pdf":"04 导论2.pdf","chapter":"导论","question":"马克思主义的现实针对性体现在哪里？","answer":"始终面向现实社会矛盾和人的解放问题。"},{"id":45,"source_pdf":"04 导论2.pdf","chapter":"导论","question":"为什么说马克思主义是科学与价值的统一？","answer":"既揭示客观规律，又指向人民解放和人的全面发展。"},{"id":46,"source_pdf":"04 导论2.pdf","chapter":"导论","question":"学习马克思主义为什么要反对本本主义？","answer":"因为脱离实际的照搬照抄违背了马克思主义精神实质。"},{"id":47,"source_pdf":"04 导论2.pdf","chapter":"导论","question":"学习导论部分首先要抓住什么？","answer":"马克思主义是什么、从哪里来、为什么行。"},{"id":48,"source_pdf":"04 导论2.pdf","chapter":"导论","question":"马克思主义的根本研究对象是什么？","answer":"自然、社会和思维发展的一般规律以及人的解放规律。"},{"id":49,"source_pdf":"04 导论2.pdf","chapter":"导论","question":"为什么说马克思主义是完整严密的理论体系？","answer":"因为哲学、政治经济学和科学社会主义相互贯通、彼此支撑。"},{"id":50,"source_pdf":"04 导论2.pdf","chapter":"导论","question":"导论部分最容易混淆的点是什么？","answer":"基本立场、基本观点、基本方法之间的区别。"},{"id":51,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"哲学的基本问题是什么？","answer":"思维和存在的关系问题。"},{"id":52,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"哲学基本问题的第一方面是什么？","answer":"思维和存在何者为第一性。"},{"id":53,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"哲学基本问题的第二方面是什么？","answer":"思维和存在有没有同一性。"},{"id":54,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"唯物主义和唯心主义是按什么标准划分的？","answer":"对思维和存在何者为第一性的不同回答。"},{"id":55,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"可知论和不可知论是围绕什么问题展开的？","answer":"思维和存在是否具有同一性的问题。"},{"id":56,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"唯物主义的基本观点是什么？","answer":"物质第一性，意识第二性，物质决定意识。"},{"id":57,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"唯心主义的基本观点是什么？","answer":"意识第一性，物质第二性，意识决定物质。"},{"id":58,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"主观唯心主义的典型特征是什么？","answer":"把人的主观精神看作世界本原。"},{"id":59,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"客观唯心主义的典型特征是什么？","answer":"把客观精神看作世界本原。"},{"id":60,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"旧唯物主义的局限性是什么？","answer":"缺乏辩证法和历史观，不能真正理解实践。"},{"id":61,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"辩证唯物主义克服旧唯物主义局限的关键是什么？","answer":"把唯物主义和辩证法统一起来。"},{"id":62,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"历史唯物主义解决了什么问题？","answer":"社会历史领域的唯物主义问题。"},{"id":63,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"世界的本原是什么？","answer":"物质。"},{"id":64,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"列宁对物质的经典界定是什么？","answer":"物质是标志客观实在的哲学范畴。"},{"id":65,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"物质的唯一特性是什么？","answer":"客观实在性。"},{"id":66,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"运动是物质的什么？","answer":"存在方式和根本属性。"},{"id":67,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"为什么说世界统一于物质？","answer":"因为世界上一切事物和现象归根到底都是物质的不同表现形态。"},{"id":68,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"静止应当怎样理解？","answer":"静止是运动的特殊状态，是相对的。"},{"id":69,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"绝对运动和相对静止的关系是什么？","answer":"运动是绝对的，静止是相对的。"},{"id":70,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"时间和空间是什么？","answer":"物质运动的存在形式。"},{"id":71,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"时间的特点是什么？","answer":"一维性和不可逆性。"},{"id":72,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"空间的特点是什么？","answer":"三维性和广延性。"},{"id":73,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"规律的含义是什么？","answer":"事物发展过程中本质的、必然的、稳定的联系。"},{"id":74,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"规律的根本特点是什么？","answer":"客观性。"},{"id":75,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"人能够创造规律吗？","answer":"不能。"},{"id":76,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"人能够消灭规律吗？","answer":"不能。"},{"id":77,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"人能够认识和利用规律吗？","answer":"能够。"},{"id":78,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"主观能动性的发挥以什么为前提？","answer":"尊重客观规律。"},{"id":79,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"尊重客观规律和发挥主观能动性的关系是什么？","answer":"二者统一，既要尊重规律又要发挥能动作用。"},{"id":80,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"意识的起源是什么？","answer":"意识是自然界长期发展的产物，是社会历史发展的产物。"},{"id":81,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"意识的本质是什么？","answer":"人脑对客观世界的主观映像。"},{"id":82,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"人脑为什么是意识的物质器官？","answer":"意识是人脑机能和属性的表现。"},{"id":83,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"意识活动的内容从何而来？","answer":"从客观世界和社会实践中来。"},{"id":84,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"意识活动的主要特征有哪些？","answer":"目的性、计划性、主动创造性。"},{"id":85,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"物质和意识的辩证关系是什么？","answer":"物质决定意识，意识对物质具有能动反作用。"},{"id":86,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"正确意识的作用是什么？","answer":"促进实践和客观事物的发展。"},{"id":87,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"错误意识的作用是什么？","answer":"阻碍实践和客观事物的发展。"},{"id":88,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"一切从实际出发的哲学依据是什么？","answer":"物质决定意识。"},{"id":89,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"实事求是的根本要求是什么？","answer":"从客观实际出发，按规律办事。"},{"id":90,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"唯物辩证法研究的核心内容是什么？","answer":"事物的普遍联系和变化发展。"},{"id":91,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"唯物辩证法的总特征是什么？","answer":"普遍联系和永恒发展。"},{"id":92,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"联系的含义是什么？","answer":"事物内部各要素之间和事物之间相互影响、相互制约、相互作用的关系。"},{"id":93,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"联系的特点有哪些？","answer":"客观性、普遍性、多样性、条件性。"},{"id":94,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"发展是什么？","answer":"前进的上升的运动。"},{"id":95,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"发展的实质是什么？","answer":"新事物的产生和旧事物的灭亡。"},{"id":96,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"新事物为什么必然战胜旧事物？","answer":"因为它符合客观规律，具有强大生命力和广阔前途。"},{"id":97,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"唯物辩证法和形而上学的根本分歧是什么？","answer":"是否承认矛盾以及是否用联系发展观点看世界。"},{"id":98,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"对立统一规律的地位是什么？","answer":"唯物辩证法的实质和核心。"},{"id":99,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"矛盾的含义是什么？","answer":"反映事物内部和事物之间对立统一关系的哲学范畴。"},{"id":100,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"矛盾的基本属性是什么？","answer":"同一性和斗争性。"},{"id":101,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"矛盾同一性的含义是什么？","answer":"矛盾双方相互依存、相互贯通的性质和趋势。"},{"id":102,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"矛盾斗争性的含义是什么？","answer":"矛盾双方相互排斥、相互分离的性质和趋势。"},{"id":103,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"矛盾同一性在发展中的作用是什么？","answer":"提供事物存在和发展的前提，并规定变化发展的可能。"},{"id":104,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"矛盾斗争性在发展中的作用是什么？","answer":"推动事物由量变到质变并促成旧统一体破裂。"},{"id":105,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"为什么说矛盾是事物发展的根本动力？","answer":"因为事物发展归根到底来自其内部矛盾运动。"},{"id":106,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"矛盾的普遍性是指什么？","answer":"矛盾存在于一切事物中，并贯穿于每一事物发展过程的始终。"},{"id":107,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"矛盾的特殊性是指什么？","answer":"不同事物的矛盾及其各个方面各有特点。"},{"id":108,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"矛盾问题的精髓是什么？","answer":"矛盾的普遍性和特殊性的关系。"},{"id":109,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"矛盾普遍性原理的方法论要求是什么？","answer":"承认矛盾、分析矛盾、勇于揭露和解决矛盾。"},{"id":110,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"矛盾特殊性原理的方法论要求是什么？","answer":"具体问题具体分析。"},{"id":111,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"主要矛盾是什么？","answer":"在复杂事物发展过程中处于支配地位、起决定作用的矛盾。"},{"id":112,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"次要矛盾是什么？","answer":"处于从属地位、受主要矛盾制约的矛盾。"},{"id":113,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"主要矛盾和次要矛盾的关系是什么？","answer":"相互影响并在一定条件下相互转化。"},{"id":114,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"矛盾的主要方面是什么？","answer":"在矛盾双方中处于支配地位、起主导作用的一方。"},{"id":115,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"矛盾的次要方面是什么？","answer":"在矛盾双方中处于被支配地位的一方。"},{"id":116,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"事物性质主要由什么决定？","answer":"主要由矛盾的主要方面决定。"},{"id":117,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"两点论的要求是什么？","answer":"全面看问题，看到主要方面也看到次要方面。"},{"id":118,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"重点论的要求是什么？","answer":"抓住主要矛盾和矛盾的主要方面。"},{"id":119,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"两点论和重点论的关系是什么？","answer":"二者统一。"},{"id":120,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"量变的含义是什么？","answer":"数量的增减和场所的变更，是不显著的变化。"},{"id":121,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"质变的含义是什么？","answer":"事物根本性质的变化，是飞跃。"},{"id":122,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"度是什么？","answer":"保持事物质的稳定性的数量界限。"},{"id":123,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"量变和质变的关系是什么？","answer":"量变是质变的必要准备，质变是量变的必然结果。"},{"id":124,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"为什么既要重视量的积累又要抓住时机促成飞跃？","answer":"因为发展总是通过量变到质变实现的。"},{"id":125,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"辩证否定观的基本内容是什么？","answer":"否定是事物的自我否定，是事物内部矛盾运动的结果。"},{"id":126,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"辩证否定的实质是什么？","answer":"扬弃。"},{"id":127,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"否定之否定规律揭示了什么？","answer":"事物发展的方向和道路。"},{"id":128,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"螺旋式上升和波浪式前进说明了什么？","answer":"事物发展前途光明、道路曲折。"},{"id":129,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"内容和形式分别指什么？","answer":"内容是构成事物的一切要素总和，形式是统一内容诸要素的结构和表现方式。"},{"id":130,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"内容和形式的关系是什么？","answer":"内容决定形式，形式反作用于内容。"},{"id":131,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"本质和现象分别指什么？","answer":"本质是根本性质和内在联系，现象是本质的外在表现。"},{"id":132,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"现象和本质的关系是什么？","answer":"现象表现本质，本质通过现象表现出来。"},{"id":133,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"原因和结果的关系是什么？","answer":"原因引起结果，二者在一定条件下相互转化。"},{"id":134,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"必然和偶然的关系是什么？","answer":"必然通过偶然表现出来，偶然受必然支配。"},{"id":135,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"可能和现实的关系是什么？","answer":"现实是已经实现的可能，可能是尚未实现的现实。"},{"id":136,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"现实可能和抽象可能的区别是什么？","answer":"现实可能具备实现条件，抽象可能缺乏现实条件。"},{"id":137,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"为什么要坚持联系和发展的观点看问题？","answer":"因为世界本身就是普遍联系和变化发展的。"},{"id":138,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"分析复杂问题为什么要抓关键环节？","answer":"因为主要矛盾和矛盾主要方面起决定作用。"},{"id":139,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"为什么不能孤立地看问题？","answer":"因为任何事物都处于普遍联系之中。"},{"id":140,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"为什么不能静止地看问题？","answer":"因为任何事物都处于变化发展之中。"},{"id":141,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"辩证法要求如何看待事物的内部条件和外部条件？","answer":"以内因为根据，外因为条件，外因通过内因起作用。"},{"id":142,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"辩证法要求如何看待前进性和曲折性？","answer":"既看到前途光明，也看到道路曲折。"},{"id":143,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"辩证分析方法的核心是什么？","answer":"抓矛盾、分主次、看转化。"},{"id":144,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"为什么说具体问题具体分析是马克思主义活的灵魂？","answer":"因为它是认识事物本质和正确解决矛盾的关键。"},{"id":145,"source_pdf":"08 五对基本范畴.pdf","chapter":"五对基本范畴","question":"内容和形式哪个起决定作用？","answer":"内容起决定作用。"},{"id":146,"source_pdf":"08 五对基本范畴.pdf","chapter":"五对基本范畴","question":"形式对内容有没有反作用？","answer":"有。"},{"id":147,"source_pdf":"08 五对基本范畴.pdf","chapter":"五对基本范畴","question":"为什么认识事物不能停留在现象上？","answer":"因为必须透过现象把握本质。"},{"id":148,"source_pdf":"08 五对基本范畴.pdf","chapter":"五对基本范畴","question":"本质能不能离开现象而存在？","answer":"不能，本质总是通过现象表现。"},{"id":149,"source_pdf":"08 五对基本范畴.pdf","chapter":"五对基本范畴","question":"原因和结果能否在一定条件下互相转化？","answer":"能够。"},{"id":150,"source_pdf":"08 五对基本范畴.pdf","chapter":"五对基本范畴","question":"必然和偶然哪个是事物发展中的决定性力量？","answer":"必然。"},{"id":151,"source_pdf":"08 五对基本范畴.pdf","chapter":"五对基本范畴","question":"偶然在发展中的作用是什么？","answer":"为必然开辟道路并影响其实现形式。"},{"id":152,"source_pdf":"08 五对基本范畴.pdf","chapter":"五对基本范畴","question":"为什么既要立足现实又要重视可能？","answer":"因为现实由可能发展而来，可能向现实转化。"},{"id":153,"source_pdf":"08 五对基本范畴.pdf","chapter":"五对基本范畴","question":"抽象可能性与现实可能性的区别依据是什么？","answer":"是否具备实现的现实条件。"},{"id":154,"source_pdf":"08 五对基本范畴.pdf","chapter":"五对基本范畴","question":"五对基本范畴在方法论上的共同要求是什么？","answer":"坚持全面、联系、发展地分析问题。"},{"id":155,"source_pdf":"09-10 认识论.pdf","chapter":"认识论","question":"实践观点在马克思主义认识论中的地位是什么？","answer":"首要观点。"},{"id":156,"source_pdf":"09-10 认识论.pdf","chapter":"认识论","question":"实践为什么是马克思主义理论区别于其他理论的根本特征？","answer":"因为实践性是马克思主义最鲜明的特点。"},{"id":157,"source_pdf":"09-10 认识论.pdf","chapter":"认识论","question":"实践的本质是什么？","answer":"感性的、对象性的物质活动。"},{"id":158,"source_pdf":"09-10 认识论.pdf","chapter":"认识论","question":"实践的基本特征有哪些？","answer":"客观实在性、自觉能动性、社会历史性。"},{"id":159,"source_pdf":"09-10 认识论.pdf","chapter":"认识论","question":"实践最基本的形式是什么？","answer":"物质生产实践。"},{"id":160,"source_pdf":"09-10 认识论.pdf","chapter":"认识论","question":"社会政治实践是什么？","answer":"处理社会关系、变革社会制度的实践活动。"},{"id":161,"source_pdf":"09-10 认识论.pdf","chapter":"认识论","question":"科学文化实践是什么？","answer":"探索世界规律、创造精神文化成果的实践活动。"},{"id":162,"source_pdf":"09-10 认识论.pdf","chapter":"认识论","question":"为什么说认识是主体对客体的能动反映？","answer":"因为认识不是机械照镜子，而是在实践基础上的能动把握。"},{"id":163,"source_pdf":"09-10 认识论.pdf","chapter":"认识论","question":"认识的来源是什么？","answer":"实践。"},{"id":164,"source_pdf":"09-10 认识论.pdf","chapter":"认识论","question":"认识发展的动力是什么？","answer":"实践。"},{"id":165,"source_pdf":"09-10 认识论.pdf","chapter":"认识论","question":"认识的目的是什么？","answer":"实践。"},{"id":166,"source_pdf":"09-10 认识论.pdf","chapter":"认识论","question":"检验真理的唯一标准是什么？","answer":"实践。"},{"id":167,"source_pdf":"09-10 认识论.pdf","chapter":"认识论","question":"为什么说全部社会生活在本质上是实践的？","answer":"因为社会生活归根到底建立在人的现实活动基础上。"},{"id":168,"source_pdf":"09-10 认识论.pdf","chapter":"认识论","question":"实践的客观实在性体现在哪里？","answer":"实践是主体借助物质手段作用于客体的现实活动。"},{"id":169,"source_pdf":"09-10 认识论.pdf","chapter":"认识论","question":"实践的自觉能动性体现在哪里？","answer":"实践总是有目的、有计划地进行。"},{"id":170,"source_pdf":"09-10 认识论.pdf","chapter":"认识论","question":"实践的社会历史性体现在哪里？","answer":"实践受一定历史阶段和社会条件制约。"},{"id":171,"source_pdf":"09-10 认识论.pdf","chapter":"认识论","question":"认识过程的基本规律是什么？","answer":"实践、认识、再实践、再认识，循环往复以至无穷。"},{"id":172,"source_pdf":"09-10 认识论.pdf","chapter":"认识论","question":"感性认识的三种基本形式是什么？","answer":"感觉、知觉、表象。"},{"id":173,"source_pdf":"09-10 认识论.pdf","chapter":"认识论","question":"理性认识的三种基本形式是什么？","answer":"概念、判断、推理。"},{"id":174,"source_pdf":"09-10 认识论.pdf","chapter":"认识论","question":"感性认识和理性认识的关系是什么？","answer":"感性认识是理性认识的基础，理性认识是感性认识的深化。"},{"id":175,"source_pdf":"09-10 认识论.pdf","chapter":"认识论","question":"感性认识上升为理性认识为什么是飞跃？","answer":"因为它实现了由现象到本质、由具体到抽象的提升。"},{"id":176,"source_pdf":"09-10 认识论.pdf","chapter":"认识论","question":"理性认识回到实践为什么更重要？","answer":"因为只有进入实践，认识才有现实意义并能接受检验。"},{"id":177,"source_pdf":"09-10 认识论.pdf","chapter":"认识论","question":"从感性认识到理性认识需要什么条件？","answer":"丰富而合乎实际的感性材料和科学抽象。"},{"id":178,"source_pdf":"09-10 认识论.pdf","chapter":"认识论","question":"为什么说理性认识依赖于感性认识？","answer":"因为理性认识必须以感性材料为基础。"},{"id":179,"source_pdf":"09-10 认识论.pdf","chapter":"认识论","question":"为什么说感性认识有待上升为理性认识？","answer":"因为感性认识只能反映事物外部联系和表面特征。"},{"id":180,"source_pdf":"09-10 认识论.pdf","chapter":"认识论","question":"主体和客体的关系在认识中如何体现？","answer":"主体通过实践同客体发生现实关系并形成认识。"},{"id":181,"source_pdf":"09-10 认识论.pdf","chapter":"认识论","question":"认识的反复性来自什么？","answer":"客观事物的复杂性和认识主体条件的限制。"},{"id":182,"source_pdf":"09-10 认识论.pdf","chapter":"认识论","question":"认识的无限性来自什么？","answer":"客观世界及其实践发展是无限的。"},{"id":183,"source_pdf":"09-10 认识论.pdf","chapter":"认识论","question":"认识过程为什么是反复性和无限性的统一？","answer":"因为每次认识都有限，但整体认识发展没有终点。"},{"id":184,"source_pdf":"09-10 认识论.pdf","chapter":"认识论","question":"认识论中的唯物主义要求是什么？","answer":"坚持认识来源于客观世界和社会实践。"},{"id":185,"source_pdf":"09-10 认识论.pdf","chapter":"认识论","question":"认识论中的辩证法要求是什么？","answer":"把认识看作不断深化发展的过程。"},{"id":186,"source_pdf":"09-10 认识论.pdf","chapter":"认识论","question":"实践在认识中的决定作用主要体现在哪几个方面？","answer":"来源、动力、目的和检验标准。"},{"id":187,"source_pdf":"09-10 认识论.pdf","chapter":"认识论","question":"为什么要坚持理论和实践相结合？","answer":"因为理论脱离实践会空洞，实践脱离理论会盲目。"},{"id":188,"source_pdf":"09-10 认识论.pdf","chapter":"认识论","question":"经验主义的主要错误是什么？","answer":"夸大感性经验的作用，轻视理性认识。"},{"id":189,"source_pdf":"09-10 认识论.pdf","chapter":"认识论","question":"教条主义的主要错误是什么？","answer":"夸大抽象理论的作用，脱离具体实际。"},{"id":190,"source_pdf":"09-10 认识论.pdf","chapter":"认识论","question":"为什么认识世界最终是为了改造世界？","answer":"因为马克思主义强调认识服务于实践。"},{"id":191,"source_pdf":"09-10 认识论.pdf","chapter":"认识论","question":"为什么实践能提出新的认识任务？","answer":"因为社会实践不断发展会暴露新问题。"},{"id":192,"source_pdf":"09-10 认识论.pdf","chapter":"认识论","question":"为什么科学实验在现代认识中越来越重要？","answer":"因为它是深化认识、验证假设的重要实践形式。"},{"id":193,"source_pdf":"09-10 认识论.pdf","chapter":"认识论","question":"为什么不能把认识看成一次完成？","answer":"因为认识总是在实践中不断修正和发展。"},{"id":194,"source_pdf":"09-10 认识论.pdf","chapter":"认识论","question":"为什么主观和客观的统一只能在实践中实现？","answer":"因为实践是连接思想与现实结果的桥梁。"},{"id":195,"source_pdf":"11-12 真理与价值.pdf","chapter":"真理与价值","question":"真理的含义是什么？","answer":"真理是人们对客观事物及其规律的正确反映。"},{"id":196,"source_pdf":"11-12 真理与价值.pdf","chapter":"真理与价值","question":"真理最基本的属性是什么？","answer":"客观性。"},{"id":197,"source_pdf":"11-12 真理与价值.pdf","chapter":"真理与价值","question":"承认真理的客观性意味着坚持什么立场？","answer":"坚持真理问题上的唯物主义。"},{"id":198,"source_pdf":"11-12 真理与价值.pdf","chapter":"真理与价值","question":"真理的一元性是指什么？","answer":"同一条件下对特定对象的真理性认识只有一个。"},{"id":199,"source_pdf":"11-12 真理与价值.pdf","chapter":"真理与价值","question":"真理的绝对性是指什么？","answer":"真理主客观统一的确定性和认识发展的无限性。"},{"id":200,"source_pdf":"11-12 真理与价值.pdf","chapter":"真理与价值","question":"真理的相对性是指什么？","answer":"人们对客观事物及其规律的正确认识在广度和深度上都是有限的。"},{"id":201,"source_pdf":"11-12 真理与价值.pdf","chapter":"真理与价值","question":"真理绝对性和相对性的关系是什么？","answer":"绝对性寓于相对性之中，相对性包含并表现绝对性。"},{"id":202,"source_pdf":"11-12 真理与价值.pdf","chapter":"真理与价值","question":"为什么说真理是具体的？","answer":"任何真理都只能在一定条件下成立。"},{"id":203,"source_pdf":"11-12 真理与价值.pdf","chapter":"真理与价值","question":"为什么说真理不是抽象的？","answer":"离开具体条件的所谓真理并不存在。"},{"id":204,"source_pdf":"11-12 真理与价值.pdf","chapter":"真理与价值","question":"真理和谬误的关系是什么？","answer":"相比较而存在，在一定条件下相互转化。"},{"id":205,"source_pdf":"11-12 真理与价值.pdf","chapter":"真理与价值","question":"实践标准的确定性是什么？","answer":"实践从根本上能够检验认识是否符合客观实际。"},{"id":206,"source_pdf":"11-12 真理与价值.pdf","chapter":"真理与价值","question":"实践标准的不确定性是什么？","answer":"具体实践总受历史条件限制，不能一次穷尽所有真理。"},{"id":207,"source_pdf":"11-12 真理与价值.pdf","chapter":"真理与价值","question":"价值的含义是什么？","answer":"客体对主体需要的满足关系。"},{"id":208,"source_pdf":"11-12 真理与价值.pdf","chapter":"真理与价值","question":"价值的主体性体现在哪里？","answer":"价值总是相对于一定主体需要而言。"},{"id":209,"source_pdf":"11-12 真理与价值.pdf","chapter":"真理与价值","question":"价值的客观性体现在哪里？","answer":"价值关系建立在客体实际属性和主体现实需要基础上。"},{"id":210,"source_pdf":"11-12 真理与价值.pdf","chapter":"真理与价值","question":"价值的社会历史性体现在哪里？","answer":"价值评价会随着时代、条件和主体群体变化而变化。"},{"id":211,"source_pdf":"11-12 真理与价值.pdf","chapter":"真理与价值","question":"价值的多维性体现在哪里？","answer":"同一对象可能具有经济、政治、道德、审美等多方面价值。"},{"id":212,"source_pdf":"11-12 真理与价值.pdf","chapter":"真理与价值","question":"价值评价和事实判断的区别是什么？","answer":"事实判断回答是什么，价值评价回答好不好。"},{"id":213,"source_pdf":"11-12 真理与价值.pdf","chapter":"真理与价值","question":"真理原则和价值原则的关系是什么？","answer":"二者统一于人类实践。"},{"id":214,"source_pdf":"11-12 真理与价值.pdf","chapter":"真理与价值","question":"为什么必须坚持真理尺度和价值尺度的统一？","answer":"因为正确实践既要符合规律，也要符合人民利益。"},{"id":215,"source_pdf":"11-12 真理与价值.pdf","chapter":"真理与价值","question":"为什么真理一定有用但有用不一定是真理？","answer":"真理以符合客观实际为标准，而不是以主观有用为标准。"},{"id":216,"source_pdf":"11-12 真理与价值.pdf","chapter":"真理与价值","question":"为什么反对实用主义真理观？","answer":"因为它把有用当作真理标准，混淆了价值和真理。"},{"id":217,"source_pdf":"11-12 真理与价值.pdf","chapter":"真理与价值","question":"为什么反对多数人承认即真理的观点？","answer":"因为真理标准不在人数多少，而在是否符合客观实际。"},{"id":218,"source_pdf":"11-12 真理与价值.pdf","chapter":"真理与价值","question":"价值实现需要什么条件？","answer":"主体需要与客体属性在实践中实现统一。"},{"id":219,"source_pdf":"11-12 真理与价值.pdf","chapter":"真理与价值","question":"为什么价值评价离不开历史条件？","answer":"因为主体需要和客体作用都会受具体历史条件制约。"},{"id":220,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"社会历史观的基本问题是什么？","answer":"社会存在和社会意识的关系问题。"},{"id":221,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"唯心史观的主要缺陷是什么？","answer":"夸大思想动机，忽视物质动因和人民群众的决定作用。"},{"id":222,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"社会存在的含义是什么？","answer":"社会生活的物质方面，是社会实践和物质生活条件的总和。"},{"id":223,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"社会存在主要包括哪些内容？","answer":"物质生产方式、自然地理环境、人口因素。"},{"id":224,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"社会存在中起决定作用的因素是什么？","answer":"物质生产方式。"},{"id":225,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"社会意识的含义是什么？","answer":"社会生活的精神方面，是社会存在的反映。"},{"id":226,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"社会意识包括哪些基本形式？","answer":"政治法律思想、道德、艺术、宗教、哲学、科学等。"},{"id":227,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"社会存在和社会意识的关系是什么？","answer":"社会存在决定社会意识，社会意识对社会存在具有反作用。"},{"id":228,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"社会意识相对独立性表现在哪些方面？","answer":"发展不完全同步、历史继承性、各种形式相互影响、反作用于社会存在。"},{"id":229,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"物质生产方式为什么是社会发展的决定力量？","answer":"因为它决定社会结构、政治制度和精神生活。"},{"id":230,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"生产力的含义是什么？","answer":"人类改造自然并使其适应社会需要的物质力量。"},{"id":231,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"生产力的构成要素有哪些？","answer":"劳动者、劳动资料、劳动对象。"},{"id":232,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"生产力中最活跃的因素是什么？","answer":"劳动者。"},{"id":233,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"科学技术在生产力中的地位是什么？","answer":"科学技术是第一生产力。"},{"id":234,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"生产关系的含义是什么？","answer":"人们在物质生产过程中形成的经济关系。"},{"id":235,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"生产关系包括哪些方面？","answer":"生产资料所有制关系、生产中人与人的关系、产品分配关系。"},{"id":236,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"生产资料所有制关系在生产关系中的地位是什么？","answer":"起决定作用。"},{"id":237,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"生产力和生产关系的辩证关系是什么？","answer":"生产力决定生产关系，生产关系反作用于生产力。"},{"id":238,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"生产关系一定要适合生产力状况的规律说明了什么？","answer":"不适合的生产关系终将被调整或变革。"},{"id":239,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"经济基础的含义是什么？","answer":"由一定发展阶段的生产关系总和构成的社会经济结构。"},{"id":240,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"上层建筑的含义是什么？","answer":"建立在一定经济基础之上的意识形态及相应制度和组织。"},{"id":241,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"国家政权属于上层建筑的哪一部分？","answer":"政治上层建筑。"},{"id":242,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"经济基础和上层建筑的关系是什么？","answer":"经济基础决定上层建筑，上层建筑反作用于经济基础。"},{"id":243,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"上层建筑一定要适合经济基础状况规律的含义是什么？","answer":"不适应经济基础的上层建筑会阻碍社会发展。"},{"id":244,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"社会基本矛盾是什么？","answer":"生产力和生产关系的矛盾，经济基础和上层建筑的矛盾。"},{"id":245,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"社会基本矛盾为什么是社会发展的根本动力？","answer":"因为社会制度和社会结构的变动归根到底由基本矛盾运动推动。"},{"id":246,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"社会形态是什么？","answer":"同生产力发展一定阶段相适应的经济基础和上层建筑的统一体。"},{"id":247,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"社会形态更替的统一性体现在哪里？","answer":"都受社会基本矛盾运动规律支配。"},{"id":248,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"社会形态更替的多样性体现在哪里？","answer":"各国发展道路、顺序和形式可能不同。"},{"id":249,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"社会形态更替的必然性来自哪里？","answer":"来自生产力与生产关系、经济基础与上层建筑的矛盾运动。"},{"id":250,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"社会形态更替中人的选择性体现在哪里？","answer":"人们可以在规律允许范围内选择具体道路和方式。"},{"id":251,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"社会革命的实质是什么？","answer":"革命阶级推翻反动统治、用新制度代替旧制度。"},{"id":252,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"改革的社会作用是什么？","answer":"改革是推动社会发展的重要动力。"},{"id":253,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"为什么改革不是否定社会主义？","answer":"改革是社会主义制度的自我完善和发展。"},{"id":254,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"人民群众的含义是什么？","answer":"一切对社会历史起推动作用的人们。"},{"id":255,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"为什么说人民群众是历史的创造者？","answer":"因为人民群众创造物质财富、精神财富并推动社会变革。"},{"id":256,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"人民群众创造物质财富体现在哪里？","answer":"他们是社会生产活动的承担者和推动者。"},{"id":257,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"人民群众创造精神财富体现在哪里？","answer":"他们提供实践基础、素材和最终检验。"},{"id":258,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"人民群众推动社会变革体现在哪里？","answer":"他们是革命和改革的主体力量。"},{"id":259,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"杰出人物在历史发展中的作用应如何评价？","answer":"承认重要作用，但不能代替人民群众的决定作用。"},{"id":260,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"群众观点的基本内容是什么？","answer":"坚信人民群众自己解放自己，全心全意为人民服务，一切向人民负责，虚心向群众学习。"},{"id":261,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"群众路线的基本内容是什么？","answer":"一切为了群众，一切依靠群众，从群众中来，到群众中去。"},{"id":262,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"为什么群众路线是党的根本工作路线？","answer":"因为人民群众是历史主体，党的力量来自人民。"},{"id":263,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"评价历史人物应坚持什么方法？","answer":"历史分析方法。"},{"id":264,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"社会意识能不能脱离社会存在独立发展？","answer":"不能，但具有相对独立性。"},{"id":265,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"自然地理环境在社会发展中的地位是什么？","answer":"重要条件，不是决定力量。"},{"id":266,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"人口因素在社会发展中的地位是什么？","answer":"必要条件，不是决定力量。"},{"id":267,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"物质资料生产方式由什么构成？","answer":"生产力和生产关系。"},{"id":268,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"社会历史发展的最终决定力量是什么？","answer":"生产方式。"},{"id":269,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"为什么历史唯物主义是科学历史观？","answer":"因为它揭示了社会发展的客观规律和人民主体地位。"},{"id":270,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"为什么社会意识会有历史继承性？","answer":"因为思想文化成果会在历史发展中积累和传承。"},{"id":271,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"为什么先进社会意识能够推动社会发展？","answer":"因为它正确反映社会发展趋势并引导实践。"},{"id":272,"source_pdf":"13-15 唯物史观.pdf","chapter":"唯物史观","question":"为什么落后社会意识会阻碍社会发展？","answer":"因为它歪曲现实、束缚实践。"},{"id":273,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"商品经济产生的历史条件是什么？","answer":"社会分工和生产资料及产品属于不同所有者。"},{"id":274,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"商品是什么？","answer":"用来交换并能满足人们某种需要的劳动产品。"},{"id":275,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"商品的二因素是什么？","answer":"使用价值和价值。"},{"id":276,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"使用价值是什么？","answer":"商品满足人们某种需要的有用性。"},{"id":277,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"价值是什么？","answer":"凝结在商品中的无差别一般人类劳动。"},{"id":278,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"使用价值是商品的什么属性？","answer":"自然属性。"},{"id":279,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"价值是商品的什么属性？","answer":"社会属性。"},{"id":280,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"使用价值和价值的关系是什么？","answer":"二者统一于商品之中，又相互矛盾。"},{"id":281,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"价值的实体是什么？","answer":"无差别一般人类劳动。"},{"id":282,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"生产商品的劳动二重性是什么？","answer":"具体劳动和抽象劳动。"},{"id":283,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"具体劳动创造什么？","answer":"使用价值。"},{"id":284,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"抽象劳动形成什么？","answer":"价值。"},{"id":285,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"私人劳动和社会劳动的矛盾为什么是简单商品经济的基本矛盾？","answer":"因为它决定商品生产和交换中的全部内在矛盾。"},{"id":286,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"商品价值量由什么决定？","answer":"社会必要劳动时间。"},{"id":287,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"社会必要劳动时间的含义是什么？","answer":"在社会正常生产条件下生产某种商品所需要的劳动时间。"},{"id":288,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"劳动生产率与商品价值量关系是什么？","answer":"劳动生产率越高，商品价值量越小。"},{"id":289,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"复杂劳动和简单劳动如何换算？","answer":"复杂劳动是倍加的简单劳动。"},{"id":290,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"价值规律的基本内容是什么？","answer":"商品价值量由社会必要劳动时间决定，商品交换实行等价交换。"},{"id":291,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"价值规律的表现形式是什么？","answer":"价格围绕价值上下波动。"},{"id":292,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"货币是怎样产生的？","answer":"从商品交换发展中自发产生。"},{"id":293,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"货币最基本的职能是什么？","answer":"价值尺度和流通手段。"},{"id":294,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"货币还有哪些重要职能？","answer":"贮藏手段、支付手段、世界货币。"},{"id":295,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"资本总公式是什么？","answer":"G-W-G'。"},{"id":296,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"资本总公式的矛盾是什么？","answer":"价值增殖不能在流通中单独产生，也不能离开流通而产生。"},{"id":297,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"劳动力为什么能成为商品？","answer":"因为劳动者有人身自由且除了劳动力一无所有。"},{"id":298,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"劳动力商品价值由什么决定？","answer":"生产和再生产劳动力所必需的生活资料价值。"},{"id":299,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"劳动力商品使用价值的特殊性是什么？","answer":"使用过程中能创造比自身价值更大的价值。"},{"id":300,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"剩余价值是什么？","answer":"雇佣工人创造并被资本家无偿占有的超过劳动力价值的那部分价值。"},{"id":301,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"资本主义剥削的实质是什么？","answer":"无偿占有雇佣工人的剩余价值。"},{"id":302,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"必要劳动时间是什么？","answer":"工人为再生产劳动力价值而劳动的时间。"},{"id":303,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"剩余劳动时间是什么？","answer":"工人为资本家无偿创造剩余价值的时间。"},{"id":304,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"绝对剩余价值是如何生产的？","answer":"通过延长工作日生产。"},{"id":305,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"相对剩余价值是如何生产的？","answer":"通过缩短必要劳动时间、相对延长剩余劳动时间生产。"},{"id":306,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"超额剩余价值是什么？","answer":"个别资本家通过提高劳动生产率获得的高于一般剩余价值的部分。"},{"id":307,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"不变资本是什么？","answer":"转移自身价值而不增殖价值的资本部分。"},{"id":308,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"可变资本是什么？","answer":"用于购买劳动力并能带来剩余价值的资本部分。"},{"id":309,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"剩余价值率反映什么关系？","answer":"资本家对工人的剥削程度。"},{"id":310,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"资本积累是什么？","answer":"把剩余价值转化为资本。"},{"id":311,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"资本积累的源泉是什么？","answer":"剩余价值。"},{"id":312,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"资本积累的一般规律说明什么？","answer":"资本积累越发展，两极分化越加剧。"},{"id":313,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"资本有机构成提高意味着什么？","answer":"不变资本比重上升，可变资本比重相对下降。"},{"id":314,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"相对过剩人口是怎样形成的？","answer":"资本积累和机器使用使一部分工人被排挤出生产。"},{"id":315,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"资本主义工资的本质是什么？","answer":"劳动力价值或价格的转化形式。"},{"id":316,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"利润本质上是什么？","answer":"剩余价值的转化形式。"},{"id":317,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"平均利润是怎样形成的？","answer":"不同部门资本通过竞争实现利润平均化。"},{"id":318,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"生产价格是什么？","answer":"成本价格加平均利润。"},{"id":319,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"商业利润来源于哪里？","answer":"产业工人创造的剩余价值的一部分。"},{"id":320,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"借贷资本的本质是什么？","answer":"为取得利息而暂时贷出的货币资本。"},{"id":321,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"利息本质上是什么？","answer":"剩余价值的一部分。"},{"id":322,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"地租本质上是什么？","answer":"农业雇佣工人创造的超过平均利润的剩余价值。"},{"id":323,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"资本主义再生产为什么会导致危机？","answer":"因为资本主义生产无限扩大趋势同劳动群众有支付能力需求相对缩小之间矛盾尖锐化。"},{"id":324,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"资本主义经济危机的实质是什么？","answer":"生产相对过剩。"},{"id":325,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"资本主义经济危机的根本原因是什么？","answer":"生产社会化和资本主义私人占有之间的矛盾。"},{"id":326,"source_pdf":"16-20 资本主义本质及规律.pdf","chapter":"资本主义本质及规律","question":"资本主义基本矛盾的两个主要表现是什么？","answer":"个别企业内部生产有组织性与全社会生产无政府状态的矛盾；生产无限扩大趋势与劳动群众购买力相对缩小的矛盾。"},{"id":327,"source_pdf":"21 资本主义的发展及其趋势.pdf","chapter":"资本主义的发展及其趋势","question":"垄断是怎样形成的？","answer":"生产集中和资本集中发展到一定阶段的结果。"},{"id":328,"source_pdf":"21 资本主义的发展及其趋势.pdf","chapter":"资本主义的发展及其趋势","question":"垄断组织最简单、最初级的形式是什么？","answer":"短期价格协定。"},{"id":329,"source_pdf":"21 资本主义的发展及其趋势.pdf","chapter":"资本主义的发展及其趋势","question":"垄断组织的本质是什么？","answer":"通过联合控制生产和市场以获取高额垄断利润。"},{"id":330,"source_pdf":"21 资本主义的发展及其趋势.pdf","chapter":"资本主义的发展及其趋势","question":"垄断条件下竞争消失了吗？","answer":"没有，而是更加复杂和激烈。"},{"id":331,"source_pdf":"21 资本主义的发展及其趋势.pdf","chapter":"资本主义的发展及其趋势","question":"垄断条件下竞争与自由竞争相比有何特点？","answer":"规模更大、时间更长、手段更残酷、范围更广。"},{"id":332,"source_pdf":"21 资本主义的发展及其趋势.pdf","chapter":"资本主义的发展及其趋势","question":"金融资本是怎样形成的？","answer":"银行资本和工业资本融合生长而形成。"},{"id":333,"source_pdf":"21 资本主义的发展及其趋势.pdf","chapter":"资本主义的发展及其趋势","question":"金融寡头是什么？","answer":"掌握金融资本并支配社会经济政治生活的垄断资本集团。"},{"id":334,"source_pdf":"21 资本主义的发展及其趋势.pdf","chapter":"资本主义的发展及其趋势","question":"金融寡头实现统治的主要方式是什么？","answer":"参与制和个人联合。"},{"id":335,"source_pdf":"21 资本主义的发展及其趋势.pdf","chapter":"资本主义的发展及其趋势","question":"资本输出在垄断资本主义阶段为何重要？","answer":"因为资本过剩要求到国外获取高额利润。"},{"id":336,"source_pdf":"21 资本主义的发展及其趋势.pdf","chapter":"资本主义的发展及其趋势","question":"国家垄断资本主义是什么？","answer":"国家政权同私人垄断资本相结合的资本主义。"},{"id":337,"source_pdf":"21 资本主义的发展及其趋势.pdf","chapter":"资本主义的发展及其趋势","question":"国家垄断资本主义的实质是什么？","answer":"资产阶级国家为垄断资本服务。"},{"id":338,"source_pdf":"21 资本主义的发展及其趋势.pdf","chapter":"资本主义的发展及其趋势","question":"经济全球化的主要表现有哪些？","answer":"生产全球化、贸易全球化、资本全球化。"},{"id":339,"source_pdf":"21 资本主义的发展及其趋势.pdf","chapter":"资本主义的发展及其趋势","question":"经济全球化对资本主义有什么作用？","answer":"有利于资本在全球范围内配置并强化其统治。"},{"id":340,"source_pdf":"21 资本主义的发展及其趋势.pdf","chapter":"资本主义的发展及其趋势","question":"当代资本主义新变化体现在哪些方面？","answer":"所有制结构、劳动关系、调节机制、社会政策和政治形式等方面。"},{"id":341,"source_pdf":"21 资本主义的发展及其趋势.pdf","chapter":"资本主义的发展及其趋势","question":"为什么说资本主义新变化没有改变其本质？","answer":"因为资本主义私有制和雇佣劳动制度没有根本改变。"},{"id":342,"source_pdf":"21 资本主义的发展及其趋势.pdf","chapter":"资本主义的发展及其趋势","question":"资本主义向社会主义过渡的根本依据是什么？","answer":"资本主义基本矛盾及其发展规律。"},{"id":343,"source_pdf":"21 资本主义的发展及其趋势.pdf","chapter":"资本主义的发展及其趋势","question":"为什么说资本主义灭亡和社会主义胜利是历史趋势？","answer":"因为资本主义基本矛盾决定其无法克服自身制度性局限。"},{"id":344,"source_pdf":"22 社会主义.pdf","chapter":"社会主义与共产主义","question":"社会主义五百年历史进程大体经历了什么过程？","answer":"从空想到科学、从理论到现实、从一国到多国。"},{"id":345,"source_pdf":"22 社会主义.pdf","chapter":"社会主义与共产主义","question":"空想社会主义的代表人物有哪些？","answer":"圣西门、傅立叶、欧文。"},{"id":346,"source_pdf":"22 社会主义.pdf","chapter":"社会主义与共产主义","question":"空想社会主义的历史功绩是什么？","answer":"为科学社会主义提供了直接思想来源。"},{"id":347,"source_pdf":"22 社会主义.pdf","chapter":"社会主义与共产主义","question":"空想社会主义的根本局限是什么？","answer":"不能揭示资本主义灭亡的经济根源和无产阶级历史作用。"},{"id":348,"source_pdf":"22 社会主义.pdf","chapter":"社会主义与共产主义","question":"使社会主义从空想变为科学的两大发现是什么？","answer":"唯物史观和剩余价值学说。"},{"id":349,"source_pdf":"22 社会主义.pdf","chapter":"社会主义与共产主义","question":"科学社会主义诞生的标志是什么？","answer":"《共产党宣言》的发表。"},{"id":350,"source_pdf":"22 社会主义.pdf","chapter":"社会主义与共产主义","question":"巴黎公社的历史意义是什么？","answer":"它是无产阶级建立政权的第一次伟大尝试。"},{"id":351,"source_pdf":"22 社会主义.pdf","chapter":"社会主义与共产主义","question":"巴黎公社的重要经验之一是什么？","answer":"无产阶级革命必须有革命武装。"},{"id":352,"source_pdf":"22 社会主义.pdf","chapter":"社会主义与共产主义","question":"巴黎公社的重要经验之二是什么？","answer":"必须打碎旧的国家机器。"},{"id":353,"source_pdf":"22 社会主义.pdf","chapter":"社会主义与共产主义","question":"巴黎公社的重要经验之三是什么？","answer":"无产阶级政权应当是为人民服务的机关。"},{"id":354,"source_pdf":"22 社会主义.pdf","chapter":"社会主义与共产主义","question":"巴黎公社的重要经验之四是什么？","answer":"必须建立无产阶级政党并发挥政治领导作用。"},{"id":355,"source_pdf":"22 社会主义.pdf","chapter":"社会主义与共产主义","question":"社会主义首先在经济文化相对落后国家取得胜利的原因是什么？","answer":"资本主义发展不平衡规律使革命可能在薄弱环节首先突破。"},{"id":356,"source_pdf":"22 社会主义.pdf","chapter":"社会主义与共产主义","question":"社会主义建设为什么具有长期性？","answer":"因为改变旧社会并建设新社会需要长期历史过程。"},{"id":357,"source_pdf":"22 社会主义.pdf","chapter":"社会主义与共产主义","question":"社会主义发展道路为什么具有多样性？","answer":"因为各国国情、历史传统和现实任务不同。"},{"id":358,"source_pdf":"22 社会主义.pdf","chapter":"社会主义与共产主义","question":"为什么说社会主义是在实践探索中前进的？","answer":"因为没有现成模式，只能在实践中不断总结和发展。"},{"id":359,"source_pdf":"22 社会主义.pdf","chapter":"社会主义与共产主义","question":"共产主义社会的根本价值目标是什么？","answer":"实现每个人自由而全面的发展。"},{"id":360,"source_pdf":"22 社会主义.pdf","chapter":"社会主义与共产主义","question":"共产主义为什么不是空想？","answer":"因为它建立在社会发展规律和现实物质条件发展趋势之上。"},{"id":361,"source_pdf":"22 社会主义.pdf","chapter":"社会主义与共产主义","question":"实现共产主义为什么是长期历史过程？","answer":"因为它需要高度发达的生产力和社会全面进步。"},{"id":362,"source_pdf":"22 社会主义.pdf","chapter":"社会主义与共产主义","question":"共产主义社会的基本特征可以概括为什么？","answer":"物质财富极大丰富、人民精神境界极大提高、每个人自由而全面发展。"},{"id":363,"source_pdf":"22 社会主义.pdf","chapter":"社会主义与共产主义","question":"为什么要把远大理想和现实奋斗统一起来？","answer":"因为共产主义目标只能通过现实历史阶段的实践逐步实现。"},{"id":364,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"关于什么是马克思主义，应当如何表述？","answer":"马克思主义是关于无产阶级和人类解放的科学。"},{"id":365,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"马克思主义的理论构成的标准表述是什么？","answer":"马克思主义哲学、马克思主义政治经济学、科学社会主义。"},{"id":366,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"马克思主义哲学的地位的标准表述是什么？","answer":"理论基础和方法论基础。"},{"id":367,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"马克思主义政治经济学的地位的标准表述是什么？","answer":"主体理论。"},{"id":368,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"科学社会主义的地位的标准表述是什么？","answer":"目的和归宿。"},{"id":369,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"马克思主义的基本立场的标准表述是什么？","answer":"人民立场。"},{"id":370,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"马克思主义的基本观点的标准表述是什么？","answer":"关于自然、社会和人类思维发展一般规律的科学认识。"},{"id":371,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"马克思主义的基本方法的标准表述是什么？","answer":"辩证唯物主义和历史唯物主义的方法。"},{"id":372,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"马克思主义最鲜明的理论品格的标准表述是什么？","answer":"与时俱进。"},{"id":373,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"马克思主义最鲜明的政治立场的标准表述是什么？","answer":"站在人民大众立场上。"},{"id":374,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"马克思主义最重要的理论品质的标准表述是什么？","answer":"坚持一切从实际出发，理论联系实际，在实践中检验和发展真理。"},{"id":375,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"马克思主义产生的社会历史条件的标准表述是什么？","answer":"资本主义的发展和工人运动的兴起。"},{"id":376,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"马克思主义产生的阶级基础的标准表述是什么？","answer":"无产阶级作为独立的政治力量登上历史舞台。"},{"id":377,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"马克思主义产生的自然科学前提主要包括什么？","answer":"细胞学说、能量守恒与转化定律、生物进化论。"},{"id":378,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"马克思主义产生的直接理论来源的标准表述是什么？","answer":"德国古典哲学、英国古典政治经济学、英法空想社会主义。"},{"id":379,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"标志马克思主义公开问世的著作的标准表述是什么？","answer":"《共产党宣言》。"},{"id":380,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"《共产党宣言》发表的意义的标准表述是什么？","answer":"标志着马克思主义的公开问世。"},{"id":381,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"关于为什么说马克思主义具有科学性，应当如何表述？","answer":"因为它揭示了自然界、人类社会和人类思维发展的普遍规律。"},{"id":382,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"关于为什么说马克思主义具有革命性，应当如何表述？","answer":"因为它是改变世界、实现人民解放的理论。"},{"id":383,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"关于为什么说马克思主义具有实践性，应当如何表述？","answer":"因为它来源于实践、指导实践，并在实践中接受检验。"},{"id":384,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"关于为什么说马克思主义具有人民性，应当如何表述？","answer":"因为它坚持人民至上，致力于实现最广大人民根本利益。"},{"id":385,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"关于为什么说马克思主义具有发展开放性，应当如何表述？","answer":"因为它不是封闭教条，而是在实践中不断丰富发展。"},{"id":386,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"学习马克思主义的根本要求的标准表述是什么？","answer":"把握立场、观点和方法的统一。"},{"id":387,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"学习马原的核心目的的标准表述是什么？","answer":"掌握观察问题、分析问题、解决问题的科学世界观和方法论。"},{"id":388,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"关于为什么要推进马克思主义中国化时代化，应当如何表述？","answer":"因为马克思主义必须同具体实际相结合才能保持生命力。"},{"id":389,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"马克思主义政党的根本政治立场的标准表述是什么？","answer":"人民立场。"},{"id":390,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"马克思主义关于未来社会的立场的标准表述是什么？","answer":"追求人类解放和每个人自由全面发展。"},{"id":391,"source_pdf":"01-03 导论1.pdf","chapter":"导论","question":"马克思主义中国化时代化的根本方法的标准表述是什么？","answer":"把马克思主义基本原理同中国具体实际相结合、同中华优秀传统文化相结合。"},{"id":392,"source_pdf":"01-03 导论1.pdf","chapter":"导论"," 的全面发展。"},{"id":409,"source_pdf":"04 导论2.pdf","chapter":"导论","question":"关于学习马克思主义为什么要反对本本主义，应当如何表述？","answer":"因为脱离实际的照搬照抄违背了马克思主义精神实质。"},{"id":410,"source_pdf":"04 导论2.pdf","chapter":"导论","question":"关于学习导论部分首先要抓住什么，应当如何表述？","answer":"马克思主义是什么、从哪里来、为什么行。"},{"id":411,"source_pdf":"04 导论2.pdf","chapter":"导论","question":"马克思主义的根本研究对象的标准表述是什么？","answer":"自然、社会和思维发展的一般规律以及人的解放规律。"},{"id":412,"source_pdf":"04 导论2.pdf","chapter":"导论","question":"关于为什么说马克思主义是完整严密的理论体系，应当如何表述？","answer":"因为哲学、政治经济学和科学社会主义相互贯通、彼此支撑。"},{"id":413,"source_pdf":"04 导论2.pdf","chapter":"导论","question":"导论部分最容易混淆的点的标准表述是什么？","answer":"基本立场、基本观点、基本方法之间的区别。"},{"id":414,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"哲学的基本问题的标准表述是什么？","answer":"思维和存在的关系问题。"},{"id":415,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"哲学基本问题的第一方面的标准表述是什么？","answer":"思维和存在何者为第一性。"},{"id":416,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"哲学基本问题的第二方面的标准表述是什么？","answer":"思维和存在有没有同一性。"},{"id":417,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"关于唯物主义和唯心主义是按什么标准划分的，应当如何表述？","answer":"对思维和存在何者为第一性的不同回答。"},{"id":418,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"关于可知论和不可知论是围绕什么问题展开的，应当如何表述？","answer":"思维和存在是否具有同一性的问题。"},{"id":419,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"唯物主义的基本观点的标准表述是什么？","answer":"物质第一性，意识第二性，物质决定意识。"},{"id":420,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"唯心主义的基本观点的标准表述是什么？","answer":"意识第一性，物质第二性，意识决定物质。"},{"id":421,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"主观唯心主义的典型特征的标准表述是什么？","answer":"把人的主观精神看作世界本原。"},{"id":422,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"客观唯心主义的典型特征的标准表述是什么？","answer":"把客观精神看作世界本原。"},{"id":423,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"旧唯物主义的局限性的标准表述是什么？","answer":"缺乏辩证法和历史观，不能真正理解实践。"},{"id":424,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"辩证唯物主义克服旧唯物主义局限的关键的标准表述是什么？","answer":"把唯物主义和辩证法统一起来。"},{"id":425,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"关于历史唯物主义解决了什么问题，应当如何表述？","answer":"社会历史领域的唯物主义问题。"},{"id":426,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"世界的本原的标准表述是什么？","answer":"物质。"},{"id":427,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"列宁对物质的经典界定的标准表述是什么？","answer":"物质是标志客观实在的哲学范畴。"},{"id":428,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"物质的唯一特性的标准表述是什么？","answer":"客观实在性。"},{"id":429,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"关于运动是物质的什么，应当如何表述？","answer":"存在方式和根本属性。"},{"id":430,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"关于为什么说世界统一于物质，应当如何表述？","answer":"因为世界上一切事物和现象归根到底都是物质的不同表现形态。"},{"id":431,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"关于静止应当怎样理解，应当如何表述？","answer":"静止是运动的特殊状态，是相对的。"},{"id":432,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"绝对运动和相对静止的关系的标准表述是什么？","answer":"运动是绝对的，静止是相对的。"},{"id":433,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"时间和空间的标准表述是什么？","answer":"物质运动的存在形式。"},{"id":434,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"时间的特点的标准表述是什么？","answer":"一维性和不可逆性。"},{"id":435,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"空间的特点的标准表述是什么？","answer":"三维性和广延性。"},{"id":436,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"规律的含义的标准表述是什么？","answer":"事物发展过程中本质的、必然的、稳定的联系。"},{"id":437,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"规律的根本特点的标准表述是什么？","answer":"客观性。"},{"id":438,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"关于人能够创造规律吗，应当如何表述？","answer":"不能。"},{"id":439,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"关于人能够消灭规律吗，应当如何表述？","answer":"不能。"},{"id":440,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"关于人能够认识和利用规律吗，应当如何表述？","answer":"能够。"},{"id":441,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"关于主观能动性的发挥以什么为前提，应当如何表述？","answer":"尊重客观规律。"},{"id":442,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"尊重客观规律和发挥主观能动性的关系的标准表述是什么？","answer":"二者统一，既要尊重规律又要发挥能动作用。"},{"id":443,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"意识的起源的标准表述是什么？","answer":"意识是自然界长期发展的产物，是社会历史发展的产物。"},{"id":444,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"意识的本质的标准表述是什么？","answer":"人脑对客观世界的主观映像。"},{"id":445,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"关于人脑为什么是意识的物质器官，应当如何表述？","answer":"意识是人脑机能和属性的表现。"},{"id":446,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"关于意识活动的内容从何而来，应当如何表述？","answer":"从客观世界和社会实践中来。"},{"id":447,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"意识活动的主要特征主要包括什么？","answer":"目的性、计划性、主动创造性。"},{"id":448,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"物质和意识的辩证关系的标准表述是什么？","answer":"物质决定意识，意识对物质具有能动反作用。"},{"id":449,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"正确意识的作用的标准表述是什么？","answer":"促进实践和客观事物的发展。"},{"id":450,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"错误意识的作用的标准表述是什么？","answer":"阻碍实践和客观事物的发展。"},{"id":451,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"一切从实际出发的哲学依据的标准表述是什么？","answer":"物质决定意识。"},{"id":452,"source_pdf":"05 唯物辩证法1.pdf","chapter":"唯物论与哲学基本问题","question":"实事求是的根本要求的标准表述是什么？","answer":"从客观实际出发，按规律办事。"},{"id":453,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"唯物辩证法研究的核心内容的标准表述是什么？","answer":"事物的普遍联系和变化发展。"},{"id":454,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"唯物辩证法的总特征的标准表述是什么？","answer":"普遍联系和永恒发展。"},{"id":455,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"联系的含义的标准表述是什么？","answer":"事物内部各要素之间和事物之间相互影响、相互制约、相互作用的关系。"},{"id":456,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"联系的特点主要包括什么？","answer":"客观性、普遍性、多样性、条件性。"},{"id":457,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"发展的标准表述是什么？","answer":"前进的上升的运动。"},{"id":458,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"发展的实质的标准表述是什么？","answer":"新事物的产生和旧事物的灭亡。"},{"id":459,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"关于新事物为什么必然战胜旧事物，应当如何表述？","answer":"因为它符合客观规律，具有强大生命力和广阔前途。"},{"id":460,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"唯物辩证法和形而上学的根本分歧的标准表述是什么？","answer":"是否承认矛盾以及是否用联系发展观点看世界。"},{"id":461,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"对立统一规律的地位的标准表述是什么？","answer":"唯物辩证法的实质和核心。"},{"id":462,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"矛盾的含义的标准表述是什么？","answer":"反映事物内部和事物之间对立统一关系的哲学范畴。"},{"id":463,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"矛盾的基本属性的标准表述是什么？","answer":"同一性和斗争性。"},{"id":464,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"矛盾同一性的含义的标准表述是什么？","answer":"矛盾双方相互依存、相互贯通的性质和趋势。"},{"id":465,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"矛盾斗争性的含义的标准表述是什么？","answer":"矛盾双方相互排斥、相互分离的性质和趋势。"},{"id":466,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"矛盾同一性在发展中的作用的标准表述是什么？","answer":"提供事物存在和发展的前提，并规定变化发展的可能。"},{"id":467,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"矛盾斗争性在发展中的作用的标准表述是什么？","answer":"推动事物由量变到质变并促成旧统一体破裂。"},{"id":468,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"关于为什么说矛盾是事物发展的根本动力，应当如何表述？","answer":"因为事物发展归根到底来自其内部矛盾运动。"},{"id":469,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"关于矛盾的普遍性是指什么，应当如何表述？","answer":"矛盾存在于一切事物中，并贯穿于每一事物发展过程的始终。"},{"id":470,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"关于矛盾的特殊性是指什么，应当如何表述？","answer":"不同事物的矛盾及其各个方面各有特点。"},{"id":471,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"矛盾问题的精髓的标准表述是什么？","answer":"矛盾的普遍性和特殊性的关系。"},{"id":472,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"矛盾普遍性原理的方法论要求的标准表述是什么？","answer":"承认矛盾、分析矛盾、勇于揭露和解决矛盾。"},{"id":473,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"矛盾特殊性原理的方法论要求的标准表述是什么？","answer":"具体问题具体分析。"},{"id":474,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"主要矛盾的标准表述是什么？","answer":"在复杂事物发展过程中处于支配地位、起决定作用的矛盾。"},{"id":475,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"次要矛盾的标准表述是什么？","answer":"处于从属地位、受主要矛盾制约的矛盾。"},{"id":476,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"主要矛盾和次要矛盾的关系的标准表述是什么？","answer":"相互影响并在一定条件下相互转化。"},{"id":477,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"矛盾的主要方面的标准表述是什么？","answer":"在矛盾双方中处于支配地位、起主导作用的一方。"},{"id":478,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"矛盾的次要方面的标准表述是什么？","answer":"在矛盾双方中处于被支配地位的一方。"},{"id":479,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"关于事物性质主要由什么决定，应当如何表述？","answer":"主要由矛盾的主要方面决定。"},{"id":480,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"两点论的要求的标准表述是什么？","answer":"全面看问题，看到主要方面也看到次要方面。"},{"id":481,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"重点论的要求的标准表述是什么？","answer":"抓住主要矛盾和矛盾的主要方面。"},{"id":482,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"两点论和重点论的关系的标准表述是什么？","answer":"二者统一。"},{"id":483,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"量变的含义的标准表述是什么？","answer":"数量的增减和场所的变更，是不显著的变化。"},{"id":484,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"质变的含义的标准表述是什么？","answer":"事物根本性质的变化，是飞跃。"},{"id":485,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"度的标准表述是什么？","answer":"保持事物质的稳定性的数量界限。"},{"id":486,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"量变和质变的关系的标准表述是什么？","answer":"量变是质变的必要准备，质变是量变的必然结果。"},{"id":487,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"关于为什么既要重视量的积累又要抓住时机促成飞跃，应当如何表述？","answer":"因为发展总是通过量变到质变实现的。"},{"id":488,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"辩证否定观的基本内容的标准表述是什么？","answer":"否定是事物的自我否定，是事物内部矛盾运动的结果。"},{"id":489,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"辩证否定的实质的标准表述是什么？","answer":"扬弃。"},{"id":490,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"关于否定之否定规律揭示了什么，应当如何表述？","answer":"事物发展的方向和道路。"},{"id":491,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"关于螺旋式上升和波浪式前进说明了什么，应当如何表述？","answer":"事物发展前途光明、道路曲折。"},{"id":492,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"关于内容和形式分别指什么，应当如何表述？","answer":"内容是构成事物的一切要素总和，形式是统一内容诸要素的结构和表现方式。"},{"id":493,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"内容和形式的关系的标准表述是什么？","answer":"内容决定形式，形式反作用于内容。"},{"id":494,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"关于本质和现象分别指什么，应当如何表述？","answer":"本质是根本性质和内在联系，现象是本质的外在表现。"},{"id":495,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"现象和本质的关系的标准表述是什么？","answer":"现象表现本质，本质通过现象表现出来。"},{"id":496,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"原因和结果的关系的标准表述是什么？","answer":"原因引起结果，二者在一定条件下相互转化。"},{"id":497,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"必然和偶然的关系的标准表述是什么？","answer":"必然通过偶然表现出来，偶然受必然支配。"},{"id":498,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"可能和现实的关系的标准表述是什么？","answer":"现实是已经实现的可能，可能是尚未实现的现实。"},{"id":499,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"现实可能和抽象可能的区别的标准表述是什么？","answer":"现实可能具备实现条件，抽象可能缺乏现实条件。"},{"id":500,"source_pdf":"06 唯物辩证法2.pdf","chapter":"唯物辩证法","question":"关于为什么要坚持联系和发展的观点看问题，应当如何表述？","answer":"因为世界本身就是普遍联系和变化发展的。"}];
    const chapters = ["唯物辩证法","导论","唯物论与哲学基本问题","资本主义本质及规律","唯物史观","认识论","真理与价值","社会主义与共产主义","资本主义的发展及其趋势","五对基本范畴"];
    const chapterCounts = {"导论":100,"唯物论与哲学基本问题":78,"唯物辩证法":103,"五对基本范畴":10,"认识论":40,"真理与价值":25,"唯物史观":53,"资本主义本质及规律":54,"资本主义的发展及其趋势":17,"社会主义与共产主义":20};
    const storageKeys = {
      mastery: "mayuan_mastery_v7"
    };

    const state = {
      chapter: "all",
      mode: "all",
      currentId: cards[0] ? cards[0].id : null,
      showAnswer: false,
      shuffleOrder: cards.map((card) => card.id),
      mastered: readJson(storageKeys.mastery, [])
    };

    const el = {
      chapterFilter: document.getElementById("chapterFilter"),
      modeAll: document.getElementById("modeAll"),
      modeWeak: document.getElementById("modeWeak"),
      flashcard: document.getElementById("flashcard"),
      flashStep: document.getElementById("flashStep"),
      flashChapter: document.getElementById("flashChapter"),
      flashQuestion: document.getElementById("flashQuestion"),
      flashAnswer: document.getElementById("flashAnswer"),
      masteryBtn: document.getElementById("masteryBtn"),
      masteryText: document.getElementById("masteryText"),
      masteryBar: document.getElementById("masteryBar"),
      prevBtn: document.getElementById("prevBtn"),
      nextBtn: document.getElementById("nextBtn"),
      shuffleBtn: document.getElementById("shuffleBtn"),
      resetMasteryBtn: document.getElementById("resetMasteryBtn")
    };

    function readJson(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch {
        return fallback;
      }
    }

    function saveJson(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function filteredCards() {
      let list = cards.slice();
      if (state.chapter !== "all") list = list.filter((card) => card.chapter === state.chapter);
      if (state.mode === "weak") list = list.filter((card) => !state.mastered.includes(card.id));
      return list.sort((a, b) => state.shuffleOrder.indexOf(a.id) - state.shuffleOrder.indexOf(b.id));
    }

    function currentCard(list) {
      if (!list.length) return null;
      const found = list.find((card) => card.id === state.currentId);
      if (found) return found;
      state.currentId = list[0].id;
      return list[0];
    }

    function renderFilter() {
      el.chapterFilter.innerHTML = ['<option value="all">全部章节</option>']
        .concat(chapters.map((chapter) => '<option value="' + chapter + '">' + chapter + '（' + chapterCounts[chapter] + '）</option>'))
        .join("");
      el.chapterFilter.value = state.chapter;
    }

    function renderCards() {
      const list = filteredCards();
      const card = currentCard(list);
      const masteryRate = cards.length ? Math.round((state.mastered.length / cards.length) * 100) : 0;

      el.masteryText.textContent = "已掌握 " + state.mastered.length + " / " + cards.length;
      el.masteryBar.style.width = masteryRate + "%";
      el.modeAll.classList.toggle("active", state.mode === "all");
      el.modeWeak.classList.toggle("active", state.mode === "weak");

      if (!card) {
        el.flashStep.textContent = "EMPTY";
        el.flashChapter.textContent = "暂无卡片";
        el.flashQuestion.textContent = "当前筛选下没有待复习内容。";
        el.flashAnswer.textContent = "切回“显示全部”或者换个章节继续刷。";
        el.masteryBtn.classList.remove("active");
        el.flashcard.classList.remove("show");
        return;
      }

      const currentIndex = list.findIndex((item) => item.id === card.id) + 1;
      el.flashStep.textContent = "QUESTION " + currentIndex;
      el.flashChapter.textContent = card.chapter;
      el.flashQuestion.textContent = card.question;
      el.flashAnswer.textContent = card.answer;
      el.masteryBtn.classList.toggle("active", state.mastered.includes(card.id));
      el.flashcard.classList.toggle("show", state.showAnswer);
    }

    function moveCard(step) {
      const list = filteredCards();
      if (!list.length) return;
      const index = list.findIndex((card) => card.id === state.currentId);
      const next = (index + step + list.length) % list.length;
      state.currentId = list[next].id;
      state.showAnswer = false;
      renderCards();
    }

    function toggleMastery() {
      const list = filteredCards();
      const card = currentCard(list);
      if (!card) return;
      if (state.mastered.includes(card.id)) {
        state.mastered = state.mastered.filter((id) => id !== card.id);
      } else {
        state.mastered = state.mastered.concat(card.id);
      }
      saveJson(storageKeys.mastery, state.mastered);
      renderCards();
    }

    function bind() {
      el.chapterFilter.addEventListener("change", (event) => {
        state.chapter = event.target.value;
        state.showAnswer = false;
        renderCards();
      });
      el.modeAll.addEventListener("click", () => {
        state.mode = "all";
        state.showAnswer = false;
        renderCards();
      });
      el.modeWeak.addEventListener("click", () => {
        state.mode = "weak";
        state.showAnswer = false;
        renderCards();
      });
      el.flashcard.addEventListener("click", () => {
        state.showAnswer = !state.showAnswer;
        renderCards();
      });
      el.masteryBtn.addEventListener("click", (event) => {
        event.stopPropagation();
        toggleMastery();
      });
      el.prevBtn.addEventListener("click", () => moveCard(-1));
      el.nextBtn.addEventListener("click", () => moveCard(1));
      el.shuffleBtn.addEventListener("click", () => {
        state.shuffleOrder = cards.map((card) => card.id).sort(() => Math.random() - 0.5);
        state.showAnswer = false;
        renderCards();
      });
      el.resetMasteryBtn.addEventListener("click", () => {
        state.mastered = [];
        saveJson(storageKeys.mastery, state.mastered);
        renderCards();
      });
      document.addEventListener("keydown", (event) => {
        if (event.code === "Space") {
          event.preventDefault();
          state.showAnswer = !state.showAnswer;
          renderCards();
        } else if (event.code === "ArrowRight") {
          moveCard(1);
        } else if (event.code === "ArrowLeft") {
          moveCard(-1);
        }
      });
    }

    renderFilter();
    renderCards();
    bind();
  </script>
</body>
