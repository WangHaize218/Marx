<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>马原即时自测</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5eee6;
      --paper: rgba(255, 251, 246, 0.9);
      --paper-strong: rgba(255, 251, 246, 0.97);
      --ink: #1f2535;
      --muted: #7a7f8d;
      --line: rgba(31, 37, 53, 0.1);
      --accent: #3467e8;
      --accent-deep: #2853bf;
      --accent-soft: rgba(52, 103, 232, 0.12);
      --green: #22a34d;
      --green-soft: rgba(34, 163, 77, 0.14);
      --shadow: 0 24px 60px rgba(83, 66, 45, 0.12);
      --radius: 28px;
      --max: 1180px;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top right, rgba(52, 103, 232, 0.1), transparent 22%),
        radial-gradient(circle at left 12%, rgba(34, 163, 77, 0.08), transparent 18%),
        linear-gradient(180deg, #f7f1e8 0%, #efe5d9 100%);
    }
    a { color: inherit; text-decoration: none; }
    button, select { font: inherit; }
    .shell { width: min(calc(100% - 24px), var(--max)); margin: 18px auto 36px; }
    .topbar, .progress-card, .card-shell, .quiz-card, .result-card {
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, 0.72);
      background: var(--paper);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }
    .topbar {
      position: sticky;
      top: 10px;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 12px 16px;
      margin-bottom: 18px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .seal {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #fffaf4;
      font-weight: 800;
      background: linear-gradient(135deg, #d66f4d, #ae3917);
    }
    .brand strong, .brand span {
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .brand strong { letter-spacing: 0.04em; }
    .brand span { font-size: 12px; color: var(--muted); }
    .nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .nav a {
      padding: 10px 14px;
      border-radius: 999px;
      color: var(--muted);
    }
    .nav a.active {
      background: var(--accent-soft);
      color: var(--accent-deep);
    }
    .nav a:hover {
      background: rgba(0, 0, 0, 0.05);
      color: var(--ink);
    }
    .section-head {
      margin-bottom: 14px;
    }
    .section-head h1, .section-head h2 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 42px);
      letter-spacing: -0.04em;
    }
    .section-head p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.05);
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .tools {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }
    select, button {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
      color: var(--ink);
      border-radius: 999px;
      padding: 12px 14px;
    }
    button {
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
    }
    button:hover { transform: translateY(-1px); }
    .toggle.active {
      background: var(--accent-soft);
      border-color: rgba(52, 103, 232, 0.24);
      color: var(--accent-deep);
    }
    .progress-card {
      padding: 18px 20px;
      margin-bottom: 16px;
      background: var(--paper-strong);
    }
    .progress-card-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 14px;
      margin-bottom: 10px;
    }
    .progress-card-head strong {
      font-size: 18px;
    }
    .progress-card-head span {
      color: var(--muted);
      font-size: 15px;
    }
    .progress-track {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.08);
    }
    .progress-fill {
      display: block;
      width: 0;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--green), #4b7767);
    }
    .card-shell {
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(249,242,235,0.96));
    }
    .card-stage {
      position: relative;
    }
    .card {
      position: relative;
      min-height: clamp(430px, 72vh, 620px);
      cursor: pointer;
      overflow: hidden;
    }
    .card-main {
      min-height: clamp(430px, 72vh, 620px);
      padding: 22px 22px 18px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.05);
      color: var(--muted);
      font-size: 13px;
    }
    .helper-bar {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .helper-chip {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(52, 103, 232, 0.08);
      color: #8890a5;
      font-size: 13px;
      white-space: nowrap;
    }
    .mastery-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: none;
      background: var(--green-soft);
      color: var(--green);
      font-size: 22px;
      font-weight: 700;
    }
    .mastery-btn.active {
      background: var(--green);
      color: #f3fff5;
    }
    .question-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 8px 18px 18px;
      transition: transform 0.42s cubic-bezier(0.2, 0.7, 0.2, 1), opacity 0.32s ease;
    }
    .question-index {
      color: var(--accent);
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }
    .question-wrap h2 {
      margin: 14px 0 0;
      max-width: 11ch;
      font-size: clamp(30px, 3.8vw, 52px);
      line-height: 1.12;
      letter-spacing: -0.05em;
      transition: transform 0.42s cubic-bezier(0.2, 0.7, 0.2, 1), font-size 0.32s ease;
    }
    .question-foot {
      padding: 0 10px 0;
      color: var(--muted);
      line-height: 1.7;
      text-align: center;
      font-size: 14px;
    }
    .answer-panel {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: min(30vh, 240px);
      background: linear-gradient(180deg, rgba(52, 103, 232, 0.98), rgba(44, 92, 214, 0.98));
      color: #f6f9ff;
      transition: opacity 0.28s ease, transform 0.46s cubic-bezier(0.2, 0.7, 0.2, 1);
      opacity: 0;
      transform: translateY(100%);
      padding: 22px 28px 26px;
      text-align: center;
      border-top-left-radius: 28px;
      border-top-right-radius: 28px;
    }
    .answer-panel-inner {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 14px;
    }
    .answer-label {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.85;
    }
    .answer-text {
      font-size: clamp(24px, 3.2vw, 44px);
      line-height: 1.24;
      letter-spacing: -0.04em;
      font-weight: 800;
    }
    .card.show .question-wrap {
      transform: translateY(-88px) scale(0.92);
      opacity: 0.98;
    }
    .card.show .question-wrap h2 {
      transform: scale(0.84);
    }
    .card.show .answer-panel {
      opacity: 1;
      transform: translateY(0);
    }
    .card-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 18px;
    }
    .nav-floats {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .nav-float {
      position: absolute;
      top: 50%;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      transform: translateY(-50%);
      pointer-events: auto;
      box-shadow: 0 14px 28px rgba(83, 66, 45, 0.14);
      font-size: 34px;
      line-height: 1;
      padding: 0;
    }
    .nav-float.prev { left: -84px; }
    .nav-float.next { right: -84px; }
    .nav-float:hover { transform: translateY(-50%) scale(1.04); }
    .nav-float:active { transform: translateY(-50%) scale(0.96); }
    .nav-float span {
      display: block;
      transform: translateY(-1px);
    }
    .quiz-layout {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 18px;
    }
    .quiz-card, .result-card {
      padding: 18px;
      background: var(--paper-strong);
    }
    .quiz-card h3, .result-card h3 {
      margin: 0 0 8px;
      font-size: 18px;
    }
    .quiz-step {
      margin-bottom: 12px;
    }
    .quiz-question {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.18;
      letter-spacing: -0.04em;
    }
    .quiz-options {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }
    .quiz-options button {
      text-align: left;
      border-radius: 18px;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.78);
    }
    .quiz-options button.selected {
      background: rgba(47, 94, 79, 0.16);
      border-color: rgba(47, 94, 79, 0.28);
    }
    .quiz-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .score {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 10px;
    }
    .score strong {
      font-size: 54px;
      line-height: 1;
    }
    .mistake {
      margin-top: 12px;
      padding: 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.68);
      border: 1px solid var(--line);
    }
    .muted {
      color: var(--muted);
      line-height: 1.7;
    }
    footer {
      padding: 14px 0 6px;
      text-align: center;
      color: var(--muted);
    }
    @media (max-width: 980px) {
      .tools, .quiz-layout {
        grid-template-columns: 1fr;
      }
      .question-wrap h2, .quiz-question {
        max-width: none;
      }
      .helper-bar {
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      .card,
      .card-main {
        min-height: clamp(380px, 62vh, 520px);
      }
      .nav-float.prev { left: -18px; }
      .nav-float.next { right: -18px; }
      .nav-float {
        width: 54px;
        height: 54px;
        font-size: 30px;
      }
      .question-wrap {
        padding: 8px 12px 12px;
      }
      .question-wrap h2 {
        font-size: clamp(26px, 6vw, 40px);
      }
      .answer-panel {
        height: min(24vh, 170px);
      }
      .answer-text {
        font-size: clamp(20px, 4.8vw, 32px);
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div class="brand">
        <div class="seal">马原</div>
        <div>
          <strong>马原即时自测</strong>
          <span>独立页面，专门回刺</span>
        </div>
      </div>
      <nav class="nav">
        <a href="index.html">手卡</a>
        <a href="quiz.html" class="active">自测</a>
      </nav>
    </div>

    <section class="section-head">
      <span class="eyebrow">Quick Quiz</span>
      <h1>单独做一轮自测</h1>
      <p>这里不掺手卡，只保留即时自测。做完就能看当前错题，回去再针对性补卡。</p>
    </section>

    <div class="quiz-layout">
      <div class="quiz-card">
        <div class="pill quiz-step" id="quizStep">第 1 题 / 12</div>
        <h2 class="quiz-question" id="quizQuestion"></h2>
        <p class="muted" id="quizChapter"></p>
        <div class="quiz-options" id="quizOptions"></div>
        <div class="quiz-actions">
          <button id="quizPrevBtn" type="button">上一题</button>
          <button id="quizNextBtn" type="button">下一题</button>
        </div>
      </div>

      <div class="result-card">
        <h3>当前成绩</h3>
        <div class="score">
          <strong id="scoreValue">0</strong>
          <span>分</span>
        </div>
        <p class="muted" id="scoreText">先把题做完，再看哪块最薄弱。</p>
        <button id="resetQuizBtn" type="button">重做这一轮</button>
        <div id="mistakeList"></div>
      </div>
    </div>

    <footer>想继续翻卡，点右上角“手卡”返回主页面。</footer>
  </div>

  <script>
    const quizItems = [{"question":"什么是马克思主义？","chapter":"导论","options":["马克思主义是关于无产阶级和人类解放的科学。","马克思主义哲学、马克思主义政治经济学、科学社会主义。","理论基础和方法论基础。","主体理论。"],"answer":0,"explain":"这题对应 导论，标准表述要锁定原答案。"},{"question":"马克思主义的理论构成是什么？","chapter":"导论","options":["马克思主义是关于无产阶级和人类解放的科学。","理论基础和方法论基础。","主体理论。","马克思主义哲学、马克思主义政治经济学、科学社会主义。"],"answer":3,"explain":"这题对应 导论，标准表述要锁定原答案。"},{"question":"马克思主义哲学的地位是什么？","chapter":"导论","options":["马克思主义哲学、马克思主义政治经济学、科学社会主义。","主体理论。","理论基础和方法论基础。","马克思主义是关于无产阶级和人类解放的科学。"],"answer":2,"explain":"这题对应 导论，标准表述要锁定原答案。"},{"question":"马克思主义政治经济学的地位是什么？","chapter":"导论","options":["理论基础和方法论基础。","主体理论。","马克思主义是关于无产阶级和人类解放的科学。","马克思主义哲学、马克思主义政治经济学、科学社会主义。"],"answer":1,"explain":"这题对应 导论，标准表述要锁定原答案。"},{"question":"科学社会主义的地位是什么？","chapter":"导论","options":["目的和归宿。","马克思主义是关于无产阶级和人类解放的科学。","马克思主义哲学、马克思主义政治经济学、科学社会主义。","理论基础和方法论基础。"],"answer":0,"explain":"这题对应 导论，标准表述要锁定原答案。"},{"question":"马克思主义的基本立场是什么？","chapter":"导论","options":["马克思主义是关于无产阶级和人类解放的科学。","马克思主义哲学、马克思主义政治经济学、科学社会主义。","理论基础和方法论基础。","人民立场。"],"answer":3,"explain":"这题对应 导论，标准表述要锁定原答案。"},{"question":"马克思主义的基本观点是什么？","chapter":"导论","options":["马克思主义哲学、马克思主义政治经济学、科学社会主义。","理论基础和方法论基础。","关于自然、社会和人类思维发展一般规律的科学认识。","马克思主义是关于无产阶级和人类解放的科学。"],"answer":2,"explain":"这题对应 导论，标准表述要锁定原答案。"},{"question":"马克思主义的基本方法是什么？","chapter":"导论","options":["理论基础和方法论基础。","辩证唯物主义和历史唯物主义的方法。","马克思主义是关于无产阶级和人类解放的科学。","马克思主义哲学、马克思主义政治经济学、科学社会主义。"],"answer":1,"explain":"这题对应 导论，标准表述要锁定原答案。"},{"question":"马克思主义最鲜明的理论品格是什么？","chapter":"导论","options":["与时俱进。","马克思主义是关于无产阶级和人类解放的科学。","马克思主义哲学、马克思主义政治经济学、科学社会主义。","理论基础和方法论基础。"],"answer":0,"explain":"这题对应 导论，标准表述要锁定原答案。"},{"question":"马克思主义最鲜明的政治立场是什么？","chapter":"导论","options":["马克思主义是关于无产阶级和人类解放的科学。","马克思主义哲学、马克思主义政治经济学、科学社会主义。","理论基础和方法论基础。","站在人民大众立场上。"],"answer":3,"explain":"这题对应 导论，标准表述要锁定原答案。"},{"question":"马克思主义最重要的理论品质是什么？","chapter":"导论","options":["马克思主义哲学、马克思主义政治经济学、科学社会主义。","理论基础和方法论基础。","坚持一切从实际出发，理论联系实际，在实践中检验和发展真理。","马克思主义是关于无产阶级和人类解放的科学。"],"answer":2,"explain":"这题对应 导论，标准表述要锁定原答案。"},{"question":"马克思主义产生的社会历史条件是什么？","chapter":"导论","options":["理论基础和方法论基础。","资本主义的发展和工人运动的兴起。","马克思主义是关于无产阶级和人类解放的科学。","马克思主义哲学、马克思主义政治经济学、科学社会主义。"],"answer":1,"explain":"这题对应 导论，标准表述要锁定原答案。"}];
    const storageKeys = {
      quiz: "mayuan_quiz_v7"
    };

    const state = {
      quizIndex: 0,
      quizAnswers: readJson(storageKeys.quiz, Array(quizItems.length).fill(null))
    };

    const el = {
      quizStep: document.getElementById("quizStep"),
      quizQuestion: document.getElementById("quizQuestion"),
      quizChapter: document.getElementById("quizChapter"),
      quizOptions: document.getElementById("quizOptions"),
      quizPrevBtn: document.getElementById("quizPrevBtn"),
      quizNextBtn: document.getElementById("quizNextBtn"),
      scoreValue: document.getElementById("scoreValue"),
      scoreText: document.getElementById("scoreText"),
      resetQuizBtn: document.getElementById("resetQuizBtn"),
      mistakeList: document.getElementById("mistakeList")
    };

    function readJson(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch {
        return fallback;
      }
    }

    function saveJson(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function renderQuiz() {
      const item = quizItems[state.quizIndex];
      if (!item) return;
      el.quizStep.textContent = "第 " + (state.quizIndex + 1) + " 题 / " + quizItems.length;
      el.quizQuestion.textContent = item.question;
      el.quizChapter.textContent = item.chapter;
      el.quizOptions.innerHTML = item.options.map((option, index) => {
        const selected = state.quizAnswers[state.quizIndex] === index ? "selected" : "";
        return '<button type="button" class="' + selected + '" data-index="' + index + '">' + String.fromCharCode(65 + index) + ". " + option + "</button>";
      }).join("");
      Array.from(el.quizOptions.querySelectorAll("button")).forEach((button) => {
        button.addEventListener("click", () => {
          state.quizAnswers[state.quizIndex] = Number(button.dataset.index);
          saveJson(storageKeys.quiz, state.quizAnswers);
          renderQuiz();
          renderResult();
        });
      });
    }

    function renderResult() {
      let correct = 0;
      const mistakes = [];
      quizItems.forEach((item, index) => {
        if (state.quizAnswers[index] === item.answer) {
          correct += 1;
        } else if (state.quizAnswers[index] !== null) {
          mistakes.push(item);
        }
      });
      const score = quizItems.length ? Math.round((correct / quizItems.length) * 100) : 0;
      el.scoreValue.textContent = String(score);
      el.scoreText.textContent = score >= 80
        ? "这一轮已经很能打了，下一步重点回看错题对应的模块。"
        : "先别焦虑，错题越集中，回去补卡越高效。";

      if (!mistakes.length) {
        el.mistakeList.innerHTML = '<div class="mistake"><p class="muted">当前还没有已暴露错题，继续做完整轮看看。</p></div>';
        return;
      }

      el.mistakeList.innerHTML = mistakes.map((item) => {
        return '<div class="mistake"><strong>' + item.question + '</strong><p class="muted">正确答案：' + item.options[item.answer] + '</p><p class="muted">' + item.explain + '</p></div>';
      }).join("");
    }

    function bind() {
      el.quizPrevBtn.addEventListener("click", () => {
        state.quizIndex = Math.max(0, state.quizIndex - 1);
        renderQuiz();
      });
      el.quizNextBtn.addEventListener("click", () => {
        state.quizIndex = Math.min(quizItems.length - 1, state.quizIndex + 1);
        renderQuiz();
      });
      el.resetQuizBtn.addEventListener("click", () => {
        state.quizIndex = 0;
        state.quizAnswers = Array(quizItems.length).fill(null);
        saveJson(storageKeys.quiz, state.quizAnswers);
        renderQuiz();
        renderResult();
      });
    }

    renderQuiz();
    renderResult();
    bind();
  </script>
</body>
</html>
